<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسلام بلس</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f6fa;
    direction: rtl;
}

/* Header */
.header {
    background: linear-gradient(135deg, #6c3cd2, #1e2a78);
    color: white;
    padding: 20px;
    text-align: center;
}

.logo-img {
    width: 80px;
}

/* Card */
.container {
    margin-top: 30px;
    padding: 10px;
}

.card {
    background: white;
    max-width: 420px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Buttons */
button {
    background: #6c3cd2;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #5a30b5;
}

/* Textarea */
textarea {
    width: 100%;
    height: 200px;
    margin-top: 10px;
    border-radius: 8px;
    padding: 10px;
    border: 1px solid #ddd;
}

/* Footer */
.footer {
    margin-top: 40px;
    background: #1e2a78;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<div class="header">
    <img src="/static/logo.png" class="logo-img">
    <h2>اسلام بلس</h2>
    <p>خدمات الدفع الإلكتروني</p>
</div>

<div class="container">
    <div class="card">

        <h3>رفع ملف PDF</h3>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required><br><br>
            <button type="submit">استخراج الأرقام</button>
        </form>

        {% if numbers %}
        <h3>النتائج</h3>

        <form method="POST" action="/download">
            <textarea name="data">{% for n in numbers %}
{{n}}
{% endfor %}</textarea>

            <br>
            <button type="submit">⬇ تحميل الأرقام</button>
        </form>
        {% endif %}

    </div>
</div>

<div class="footer">
    📞 777777777 <br>
    🌐 Eslam Plus
</div>

</body>
</html>
